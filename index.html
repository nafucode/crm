<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户反馈看板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-color-hover: #0056b3;
            --light-gray: #f8f9fa;
            --medium-gray: #e9ecef;
            --dark-gray: #6c757d;
            --text-color: #212529;
            --white: #ffffff;
            --border-color: #ced4da;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --border-radius: 0.375rem; /* 6px */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: var(--text-color);
        }

        .navbar {
            background-color: var(--white);
            box-shadow: var(--shadow);
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
        }
        .nav-links a {
            color: var(--dark-gray);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-color);
        }
        #logout-btn {
            background: none;
            border: none;
            color: var(--dark-gray);
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
        }

        .main-content {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top */
            padding: 2rem;
            box-sizing: border-box;
            padding-top: 80px; /* Space for navbar */
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--text-color);
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .customer-form-instance {
            border: 1px solid var(--medium-gray);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .customer-form-instance h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        #add-customer-btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed var(--primary-color);
            border-radius: var(--border-radius);
            background-color: transparent;
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #add-customer-btn:hover {
            background-color: rgba(0, 123, 255, 0.05);
            border-style: solid;
        }
        .delete-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28px;
            height: 28px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            background-color: var(--light-gray);
            color: var(--dark-gray);
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
            transform: scale(1.1);
        }

        .form-group {
            display: grid;
            grid-template-columns: 90px 1fr;
            align-items: start;
            gap: 0 1rem;
        }

        label {
            font-weight: 500;
            color: var(--dark-gray);
            text-align: right;
            padding-top: 0.75rem; /* Vertically align with input text */
        }

        input[type="text"],
        textarea,
        select {
            padding: 0.75rem 1rem; /* 12px 16px */
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button[type="submit"] {
            padding: 0.875rem 1.5rem; /* 14px 24px */
            border: none;
            border-radius: var(--border-radius);
            background-color: var(--primary-color);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-color-hover);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard.html" class="navbar-brand">数据看板系统</a>
        <div class="nav-links">
            <a href="/index.html" class="active">提交反馈</a>
            <a href="/dashboard.html">数据看板</a>
            <button id="logout-btn">退出登录</button>
        </div>
    </div>
    <div class="main-content">
        <div class="container">
            <h1>客户信息批量提交</h1>
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="submitter">提交人</label>
                    <input type="text" id="submitter" name="submitter" required>
                </div>

                <div id="customer-forms-container">
                    <!-- 客户表单将动态插入这里 -->
                </div>

                <button type="button" id="add-customer-btn">+ 增加新客户</button>

                <button type="submit">提交所有客户信息</button>
            </form>
        </div>
    </div>

    <script>
        const countryOptions = {
            "非洲": ["Nigeria", "Cameroon", "South Africa", "Kenya", "Ghana", "Ethiopia"],
            "中亚": ["Kazakhstan", "Uzbekistan", "Turkmenistan"],
            "中东": ["Saudi Arabia", "UAE", "Qatar", "Kuwait", "Oman"],
            "东南亚": ["Vietnam", "Thailand", "Malaysia", "Indonesia", "Philippines"],
            "大洋洲": ["Australia", "New Zealand"],
            "中美洲": ["Mexico", "Panama", "Costa Rica"],
            "南美洲": ["Brazil", "Argentina", "Colombia", "Chile", "Peru"]
        };

        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }

        // 认证和用户信息获取
        const token = localStorage.getItem('authToken');
        if (!token) {
            window.location.href = '/login.html';
        } else {
            const userPayload = parseJwt(token);
            if (userPayload) {
                // 根据角色显示或隐藏看板链接
                if (userPayload.role !== 'admin') {
                    const dashboardLink = document.querySelector('a[href="/dashboard.html"]');
                    if (dashboardLink) dashboardLink.style.display = 'none';
                }

                // 自动填充提交人
                fetch('/api/user', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(response => {
                        if (!response.ok) throw new Error('认证失败');
                        return response.json();
                    })
                    .then(user => {
                        const submitterInput = document.getElementById('submitter');
                        submitterInput.value = user.realName;
                        submitterInput.readOnly = true;
                        submitterInput.style.backgroundColor = '#e9ecef';
                    })
                    .catch(error => {
                        console.error('获取用户信息失败:', error);
                        localStorage.removeItem('authToken');
                        window.location.href = '/login.html';
                    });
            } else {
                localStorage.removeItem('authToken');
                window.location.href = '/login.html';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            window.location.href = '/login.html';
        });

        document.addEventListener('DOMContentLoaded', function() {
            const addCustomerBtn = document.getElementById('add-customer-btn');
            const container = document.getElementById('customer-forms-container');
            const form = document.getElementById('feedbackForm');
            let nextCustomerId = 1;

            function renumberVisualHeaders() {
                container.querySelectorAll('.customer-form-instance').forEach((form, index) => {
                    form.querySelector('h2').textContent = `客户 #${index + 1}`;
                });
            }

            function addCustomerForm() {
                const customerId = nextCustomerId++;
                const formInstance = document.createElement('div');
                formInstance.className = 'customer-form-instance';

                formInstance.innerHTML = `
                    <button type="button" class="delete-btn" title="删除此客户">&times;</button>
                    <h2>客户</h2>
                    <div class="form-group">
                        <label for="country-${customerId}">国家</label>
                        <input type="text" id="country-${customerId}" name="country" required>
                    </div>
                    <div class="form-group">
                        <label for="customerInfo-${customerId}">客户信息</label>
                        <textarea id="customerInfo-${customerId}" name="customerInfo" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="phone-${customerId}">电话</label>
                        <input type="text" id="phone-${customerId}" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="description-${customerId}">其他描述</label>
                        <textarea id="description-${customerId}" name="description" rows="3"></textarea>
                    </div>
                `;

                const countryInput = formInstance.querySelector(`#country-${customerId}`);
                const choices = new Choices(countryInput, {
                    choices: Object.values(countryOptions).flat().map(country => ({ value: country, label: country })),
                    shouldSort: false,
                    searchEnabled: true,
                    placeholder: true,
                    placeholderValue: '输入或选择国家',
                    itemSelectText: '按 Enter 选择',
                });

                formInstance.querySelector('.delete-btn').addEventListener('click', function() {
                    if (container.querySelectorAll('.customer-form-instance').length > 1) {
                        formInstance.remove();
                        renumberVisualHeaders();
                    } else {
                        alert('至少需要保留一个客户信息表单。');
                    }
                });

                container.appendChild(formInstance);
                renumberVisualHeaders();
            }

            addCustomerForm();
            addCustomerBtn.addEventListener('click', addCustomerForm);

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const submitter = document.getElementById('submitter').value;
                const allCustomersData = [];
                const customerForms = container.querySelectorAll('.customer-form-instance');

                for (const customerForm of customerForms) {
                    const country = customerForm.querySelector(`[name="country"]`).value;
                    if (!country) {
                        alert('所有客户都必须选择一个国家。');
                        return;
                    }
                    allCustomersData.push({
                        country: country,
                        customerInfo: customerForm.querySelector(`[name="customerInfo"]`).value,
                        phone: customerForm.querySelector(`[name="phone"]`).value,
                        description: customerForm.querySelector(`[name="description"]`).value,
                        submitter: submitter,
                        Timestamp: new Date().toISOString()
                    });
                }

                if (allCustomersData.length === 0) {
                    alert('请至少添加一个客户信息！');
                    return;
                }

                fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(allCustomersData),
                })
                .then(response => {
                    if (!response.ok) throw new Error('提交失败，请重新登录或联系管理员');
                    return response.text();
                })
                .then(data => {
                    alert('所有客户反馈提交成功！');
                    container.innerHTML = '';
                    nextCustomerId = 1;
                    addCustomerForm();
                })
                .catch((error) => {
                    alert(error.message);
                });
            });
        });
    </script>
</body>
</html>
