<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户反馈看板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-color-hover: #0056b3;
            --light-gray: #f8f9fa;
            --medium-gray: #e9ecef;
            --dark-gray: #6c757d;
            --text-color: #212529;
            --white: #ffffff;
            --border-color: #ced4da;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --border-radius: 0.375rem; /* 6px */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: var(--text-color);
        }

        .navbar {
            background-color: var(--white);
            box-shadow: var(--shadow);
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
        }
        .nav-links a {
            color: var(--dark-gray);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-color);
        }
        #logout-btn {
            background: none;
            border: none;
            color: var(--dark-gray);
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
        }

        .main-content {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align to top */
            padding: 2rem;
            box-sizing: border-box;
            padding-top: 80px; /* Space for navbar */
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2.5rem;
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--text-color);
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .customer-form-instance {
            border: 1px solid var(--medium-gray);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .customer-form-instance h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        #add-customer-btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border: 2px dashed var(--primary-color);
            border-radius: var(--border-radius);
            background-color: transparent;
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #add-customer-btn:hover {
            background-color: rgba(0, 123, 255, 0.05);
            border-style: solid;
        }
        .delete-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 28px;
            height: 28px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            background-color: var(--light-gray);
            color: var(--dark-gray);
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
            transform: scale(1.1);
        }

        .form-group {
            display: grid;
            grid-template-columns: 90px 1fr;
            align-items: start;
            gap: 0 1rem;
        }

        label {
            font-weight: 500;
            color: var(--dark-gray);
            text-align: right;
            padding-top: 0.75rem; /* Vertically align with input text */
        }

        input[type="text"],
        textarea,
        select {
            padding: 0.75rem 1rem; /* 12px 16px */
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button[type="submit"] {
            padding: 0.875rem 1.5rem; /* 14px 24px */
            border: none;
            border-radius: var(--border-radius);
            background-color: var(--primary-color);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-color-hover);
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }

        .choices {
            width: 100%;
            margin-bottom: 0;
        }
        .choices__inner {
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background-color: var(--white);
            min-height: 44px;
        }
        .choices__input {
            background-color: transparent;
        }
        .table-container {
            overflow-x: auto;
            max-height: 400px; /* Limit height and make it scrollable */
            margin-top: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap; /* Prevent text wrapping */
        }
        thead th {
            background-color: var(--light-gray);
            position: sticky;
            top: 0;
            z-index: 1;
            font-weight: 600;
        }
        tbody tr:hover {
            background-color: #f1f3f5;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard.html" class="navbar-brand">数据看板系统</a>
        <div class="nav-links">
            <a href="/index.html" class="active">提交反馈</a>
            <a href="/dashboard.html">数据看板</a>
            <button id="logout-btn">退出登录</button>
        </div>
    </div>
    <div class="main-content">
        <div class="container">
            <h1>客户信息批量提交</h1>
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="submitter">提交人</label>
                    <input type="text" id="submitter" name="submitter" required>
                </div>

                <div id="customer-forms-container">
                    <!-- 客户表单将动态插入这里 -->
                </div>

                <button type="button" id="add-customer-btn">+ 增加新客户</button>

                <button type="submit">提交所有客户信息</button>
            </form>
        </div>
    </div>

    <div class="main-content" style="padding-top: 0;">
        <div class="container">
            <h2>我的提交历史</h2>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>国家</th>
                            <th>客户信息</th>
                            <th>电话</th>
                            <th>其他描述</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 历史数据将动态插入这里 -->
                    </tbody>
                </table>
            </div>
        </div>

    <script>
        const countryOptions = {
            "非洲": [
                { value: "Algeria", label: "Algeria 阿尔及利亚" },
                { value: "Angola", label: "Angola 安哥拉" },
                { value: "Benin", label: "Benin 贝宁" },
                { value: "Botswana", label: "Botswana 博茨瓦纳" },
                { value: "Cameroon", label: "Cameroon 喀麦隆" },
                { value: "Cote d'Ivoire", label: "Cote d'Ivoire 科特迪瓦" },
                { value: "Djibouti", label: "Djibouti 吉布提" },
                { value: "Democratic Republic of the Congo", label: "Democratic Republic of the Congo 刚果民主共和国" },
                { value: "Egypt", label: "Egypt 埃及" },
                { value: "Ethiopia", label: "Ethiopia 埃塞俄比亚" },
                { value: "Ghana", label: "Ghana 加纳" },
                { value: "Guinea", label: "Guinea 几内亚" },
                { value: "Kenya", label: "Kenya 肯尼亚" },
                { value: "Libya", label: "Libya 利比亚" },
                { value: "Mali", label: "Mali 马里" },
                { value: "Mauritius", label: "Mauritius 毛里求斯" },
                { value: "Morocco", label: "Morocco 摩洛哥" },
                { value: "Mozambique", label: "Mozambique 莫桑比克" },
                { value: "Namibia", label: "Namibia 纳米比亚" },
                { value: "Nigeria", label: "Nigeria 尼日利亚" },
                { value: "Rwanda", label: "Rwanda 卢旺达" },
                { value: "Senegal", label: "Senegal 塞内加尔" },
                { value: "Seychelles", label: "Seychelles 塞舌尔" },
                { value: "Sierra Leone", label: "Sierra Leone 塞拉利昂" },
                { value: "Somalia", label: "Somalia 索马里" },
                { value: "South Africa", label: "South Africa 南非" },
                { value: "Tanzania", label: "Tanzania 坦桑尼亚" },
                { value: "Uganda", label: "Uganda 乌干达" },
                { value: "Zambia", label: "Zambia 赞比亚" },
                { value: "Zimbabwe", label: "Zimbabwe 津巴布韦" },
            ],
            "亚洲": [
                { value: "Afghanistan", label: "Afghanistan 阿富汗" },
                { value: "Bangladesh", label: "Bangladesh 孟加拉国" },
                { value: "Cambodia", label: "Cambodia 柬埔寨" },
                { value: "Indonesia", label: "Indonesia 印度尼西亚" },
                { value: "Iraq", label: "Iraq 伊拉克" },
                { value: "Kazakhstan", label: "Kazakhstan 哈萨克斯坦" },
                { value: "Kyrgyzstan", label: "Kyrgyzstan 吉尔吉斯斯坦" },
                { value: "Malaysia", label: "Malaysia 马来西亚" },
                { value: "Mongolia", label: "Mongolia 蒙古" },
                { value: "Oman", label: "Oman 阿曼" },
                { value: "Philippines", label: "Philippines 菲律宾" },
                { value: "Qatar", label: "Qatar 卡塔尔" },
                { value: "Saudi Arabia", label: "Saudi Arabia 沙特阿拉伯" },
                { value: "Syria", label: "Syria 叙利亚" },
                { value: "Tajikistan", label: "Tajikistan 塔吉克斯坦" },
                { value: "Thailand", label: "Thailand 泰国" },
                { value: "United Arab Emirates", label: "United Arab Emirates 阿拉伯联合酋长国" },
            ],
            "欧洲": [
                { value: "Russia", label: "Russia 俄罗斯" },
                { value: "Ukraine", label: "Ukraine 乌克兰" },
            ],
            "北美洲": [
                { value: "Costa Rica", label: "Costa Rica 哥斯达黎加" },
                { value: "El Salvador", label: "El Salvador 萨尔瓦多" },
                { value: "Guatemala", label: "Guatemala 危地马拉" },
                { value: "Honduras", label: "Honduras 洪都拉斯" },
                { value: "Mexico", label: "Mexico 墨西哥" },
                { value: "Panama", label: "Panama 巴拿马" },
            ],
            "南美洲": [
                { value: "Argentina", label: "Argentina 阿根廷" },
                { value: "Brazil", label: "Brazil 巴西" },
                { value: "Colombia", label: "Colombia 哥伦比亚" },
                { value: "Ecuador", label: "Ecuador 厄瓜多尔" },
                { value: "Guyana", label: "Guyana 圭亚那" },
                { value: "Paraguay", label: "Paraguay 巴拉圭" },
                { value: "Peru", label: "Peru 秘鲁" },
            ],
            "大洋洲": [
                { value: "Australia", label: "Australia 澳大利亚" },
                { value: "Papua New Guinea", label: "Papua New Guinea 巴布亚新几内亚" },
            ]
        };

        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }

        // 认证和用户信息获取
        const token = localStorage.getItem('authToken');
        if (!token) {
            window.location.href = '/login.html';
        } else {
            const userPayload = parseJwt(token);
            if (userPayload) {
                // 根据角色显示或隐藏看板链接
                if (userPayload.role !== 'admin') {
                    const dashboardLink = document.querySelector('a[href="/dashboard.html"]');
                    if (dashboardLink) dashboardLink.style.display = 'none';
                }

                // 自动填充提交人
                fetch('/api/user', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(response => {
                        if (!response.ok) throw new Error('认证失败');
                        return response.json();
                    })
                    .then(user => {
                        const submitterInput = document.getElementById('submitter');
                        submitterInput.value = user.realName;
                        submitterInput.readOnly = true;
                        submitterInput.style.backgroundColor = '#e9ecef';
                    })
                    .catch(error => {
                        console.error('获取用户信息失败:', error);
                        localStorage.removeItem('authToken');
                        window.location.href = '/login.html';
                    });
            } else {
                localStorage.removeItem('authToken');
                window.location.href = '/login.html';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            window.location.href = '/login.html';
        });

        document.addEventListener('DOMContentLoaded', function() {
            const addCustomerBtn = document.getElementById('add-customer-btn');
            const container = document.getElementById('customer-forms-container');
            const form = document.getElementById('feedbackForm');
            let nextCustomerId = 1;

            function renumberVisualHeaders() {
                container.querySelectorAll('.customer-form-instance').forEach((form, index) => {
                    form.querySelector('h2').textContent = `客户 #${index + 1}`;
                });
            }

            function addCustomerForm() {
                const customerId = nextCustomerId++;
                const formInstance = document.createElement('div');
                formInstance.className = 'customer-form-instance';

                formInstance.innerHTML = `
                    <button type="button" class="delete-btn" title="删除此客户">&times;</button>
                    <h2>客户</h2>
                    <div class="form-group">
                        <label for="country-${customerId}">国家</label>
                        <select id="country-${customerId}" name="country" required></select>
                    </div>
                    <div class="form-group">
                        <label for="customerInfo-${customerId}">客户信息</label>
                        <textarea id="customerInfo-${customerId}" name="customerInfo" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="phone-${customerId}">电话</label>
                        <input type="text" id="phone-${customerId}" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="description-${customerId}">其他描述</label>
                        <textarea id="description-${customerId}" name="description" rows="3"></textarea>
                    </div>
                `;

                const countrySelect = formInstance.querySelector(`#country-${customerId}`);

                const choices = new Choices(countrySelect, {
                    shouldSort: false,
                    searchEnabled: true,
                    searchPlaceholderValue: '输入字母搜索国家...',
                    placeholder: true,
                    placeholderValue: '输入或选择国家',
                    itemSelectText: '',
                    noResultsText: '没有找到匹配的国家',
                    noChoicesText: '没有可选国家',
                });

                const choicesData = Object.entries(countryOptions).map(([region, countries]) => ({
                    label: region,
                    id: region,
                    disabled: false,
                    choices: countries
                }));

                choices.setChoices(choicesData, 'value', 'label', true);

                formInstance.querySelector('.delete-btn').addEventListener('click', function() {
                    if (container.querySelectorAll('.customer-form-instance').length > 1) {
                        formInstance.remove();
                        renumberVisualHeaders();
                    } else {
                        alert('至少需要保留一个客户信息表单。');
                    }
                });

                container.appendChild(formInstance);
                renumberVisualHeaders();
            }

            addCustomerBtn.addEventListener('click', addCustomerForm);

            // Fetch and render history on initial load
            fetchAndRenderHistory();

            function fetchAndRenderHistory() {
                fetch('/api/my-submissions', { 
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(response => {
                    if (!response.ok) throw new Error('获取历史记录失败');
                    return response.json();
                })
                .then(data => {
                    const historyTableBody = document.querySelector('#history-table tbody');
                    historyTableBody.innerHTML = ''; // Clear existing rows
                    data.forEach(item => {
                        const row = historyTableBody.insertRow();
                        row.innerHTML = `
                            <td>${new Date(item.Timestamp || item.timestamp).toLocaleString()}</td>
                            <td>${item.country}</td>
                            <td>${item.customerId}</td>
                            <td>${item.phone || '-'}</td>
                            <td>${item.summary || '-'}</td>
                        `;
                    });
                })
                .catch(error => console.error('Error fetching history:', error));
            }

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                const submitter = document.getElementById('submitter').value;
                const allCustomersData = [];
                const customerForms = container.querySelectorAll('.customer-form-instance');

                for (const customerForm of customerForms) {
                    const country = customerForm.querySelector(`[name="country"]`).value;
                    if (!country) {
                        alert('所有客户都必须选择一个国家。');
                        return;
                    }
                    allCustomersData.push({
                        country: country,
                        customerId: customerForm.querySelector(`[name="customerInfo"]`).value, // 使用 customerId
                        phone: customerForm.querySelector(`[name="phone"]`).value,
                        summary: customerForm.querySelector(`[name="description"]`).value, // 使用 summary
                        salesperson: submitter, // 字段名改为 salesperson 以保持一致
                        Timestamp: new Date().toISOString()
                    });
                }

                if (allCustomersData.length === 0) {
                    alert('请至少添加一个客户信息！');
                    return;
                }

                fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(allCustomersData),
                })
                .then(response => {
                    if (!response.ok) throw new Error('提交失败，请重新登录或联系管理员');
                    return response.text();
                })
                .then(data => {
                    alert('所有客户反馈提交成功！');
                    container.innerHTML = '';
                    addCustomerForm(); // Add a fresh form
                    fetchAndRenderHistory(); // Refresh history table
                })
                .catch(error => {
                    alert(error.message);
                });
            });
        });
    </script>
</body>
</html>
