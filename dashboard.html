<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.3.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/world.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --background-color: #f8f9fa;
            --white: #fff;
            --text-color: #333;
            --border-color: #dee2e6;
            --border-radius: 0.375rem;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        h1, h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .summary-section {
            background-color: #e9f5ff;
            border-left: 5px solid var(--primary-color);
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
        }

        .summary-section .highlight {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        #map-container {
            width: 100%;
            height: 500px;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        thead th {
            background-color: #f2f2f2;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #f1f1f1;
        }

        .date-header {
            background-color: var(--primary-color);
            color: var(--white);
            font-weight: bold;
            padding: 0.75rem;
        }

        .date-header td {
            border: none;
        }

        .action-buttons button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            margin: 0 5px;
            transition: color 0.2s;
        }

        .action-buttons .save-btn {
            color: #28a745;
        }
        .action-buttons .save-btn:hover {
            color: #218838;
        }

        .action-buttons .delete-btn {
            color: #dc3545;
        }
        .action-buttons .delete-btn:hover {
            color: #c82333;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard.html" class="navbar-brand">数据看板系统</a>
        <div class="nav-links">
            <a href="/index.html">提交反馈</a>
            <a href="/dashboard.html" class="active">数据看板</a>
            <button id="logout-btn">退出登录</button>
        </div>
    </div>
    <div class="main-content">
        <div class="container">
            <h1>数据看板</h1>
            
            <div id="summary-section" class="summary-section"></div>

            <h2>客户地理分布</h2>
            <div id="map-container"></div>

            <h2>详细数据列表</h2>
            <div class="table-wrapper">
                <table id="feedbackTable">
                    <thead>
                        <tr>
                            <!-- 表头将由 JavaScript 动态生成 -->
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 数据行将由 JavaScript 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }

        // 国家中英文映射
        const countryNameMap = {
            "Algeria": "阿尔及利亚", "Angola": "安哥拉", "Benin": "贝宁", "Botswana": "博茨瓦纳", "Cameroon": "喀麦隆", "Cote d'Ivoire": "科特迪瓦", "Djibouti": "吉布提", "Democratic Republic of the Congo": "刚果民主共和国", "Egypt": "埃及", "Ethiopia": "埃塞俄比亚", "Ghana": "加纳", "Guinea": "几内亚", "Kenya": "肯尼亚", "Libya": "利比亚", "Mali": "马里", "Mauritius": "毛里求斯", "Morocco": "摩洛哥", "Mozambique": "莫桑比克", "Namibia": "纳米比亚", "Nigeria": "尼日利亚", "Rwanda": "卢旺达", "Senegal": "塞内加尔", "Seychelles": "塞舌尔", "Sierra Leone": "塞拉利昂", "Somalia": "索马里", "South Africa": "南非", "Tanzania": "坦桑尼亚", "Uganda": "乌干达", "Zambia": "赞比亚", "Zimbabwe": "津巴布韦",
            "Afghanistan": "阿富汗", "Bangladesh": "孟加拉国", "Cambodia": "柬埔寨", "Indonesia": "印度尼西亚", "Iraq": "伊拉克", "Kazakhstan": "哈萨克斯坦", "Kyrgyzstan": "吉尔吉斯斯坦", "Malaysia": "马来西亚", "Mongolia": "蒙古", "Oman": "阿曼", "Philippines": "菲律宾", "Qatar": "卡塔尔", "Saudi Arabia": "沙特阿拉伯", "Syria": "叙利亚", "Tajikistan": "塔吉克斯坦", "Thailand": "泰国", "United Arab Emirates": "阿拉伯联合酋长国",
            "Russia": "俄罗斯", "Ukraine": "乌克兰",
            "Costa Rica": "哥斯达黎加", "El Salvador": "萨尔瓦多", "Guatemala": "危地马拉", "Honduras": "洪都拉斯", "Mexico": "墨西哥", "Panama": "巴拿马",
            "Argentina": "阿根廷", "Brazil": "巴西", "Colombia": "哥伦比亚", "Ecuador": "厄瓜多尔", "Guyana": "圭亚那", "Paraguay": "巴拉圭", "Peru": "秘鲁",
            "Australia": "澳大利亚", "Papua New Guinea": "巴布亚新几内亚"
        };

        const token = localStorage.getItem('authToken');
        if (!token) {
            window.location.href = '/login.html';
        } else {
            const userPayload = parseJwt(token);
            if (!userPayload || userPayload.role !== 'admin') {
                alert('您没有权限访问此页面。');
                window.location.href = '/index.html'; // 非管理员跳转到提交页
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('authToken');
            window.location.href = '/login.html';
        });

        document.addEventListener('DOMContentLoaded', function() {
            // 初始化 ECharts 实例
            const mapChart = echarts.init(document.getElementById('map-container'));

            // 获取地图数据并渲染
            function renderMap() {
                fetch('/api/map-data', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(handleAuthError)
                    .then(response => response.json())
                    .then(mapData => {
                        const option = {
                            tooltip: { trigger: 'item', formatter: params => `${params.name} : ${params.value || 0} 客户` },
                            visualMap: {
                            min: 0,
                            max: Math.max(...mapData.map(item => item.value), 10),
                            left: 'left', top: 'bottom', text: ['高', '低'], calculable: true,
                            inRange: { color: ['#E0FFFF', '#008080', '#FF4500'] } // 从浅蓝到青色再到橙红
                        },
                            series: [{
                                name: '客户分布', type: 'map', map: 'world', roam: true,
                                scaleLimit: { min: 1, max: 8 }, // 限制缩放范围
                                emphasis: { label: { show: true } },
                                data: mapData
                            }]
                        };
                        mapChart.setOption(option);
                    })
                    .catch(error => console.error('加载地图数据失败:', error));
            }

            // 获取表格数据并渲染
            function renderTable() {
                fetch('/api/data', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(handleAuthError)
                    .then(response => response.json())
                    .then(data => {
                        const tableHead = document.querySelector('#feedbackTable thead tr');
                        const tableBody = document.querySelector('#feedbackTable tbody');
                        tableHead.innerHTML = ''; // 清空旧表头
                        tableBody.innerHTML = ''; // 清空旧数据

                        if (data.length === 0) {
                            tableBody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
                            return;
                        }

                        const headerMapping = {
                            'timestamp': '日期', 'country': '国家', 'customerInfo': '客户信息',
                            'phone': '电话', 'description': '其他描述', 'submitter': '提交人'
                        };
                        const orderedHeaders = ['timestamp', 'country', 'customerInfo', 'phone', 'description', 'submitter'];

                        orderedHeaders.forEach(key => {
                            const th = document.createElement('th');
                            th.textContent = headerMapping[key];
                            tableHead.appendChild(th);
                        });
                        tableHead.appendChild(document.createElement('th')).textContent = '操作';

                        const today = new Date().toISOString().split('T')[0];
                    let todayCount = 0;

                    const groupedData = data.reduce((acc, row) => {
                        const timestamp = row.Timestamp || row.timestamp || '';
                        const date = timestamp ? timestamp.split('T')[0] : '未知日期';
                        if (date === today) {
                            todayCount++;
                        }
                        if (!acc[date]) acc[date] = [];
                        acc[date].push(row);
                        return acc;
                    }, {});

                    document.getElementById('summary-section').innerHTML = `<strong>当日总结：</strong>共计 <span class="highlight">${todayCount}</span> 个新增客户。`;

                        for (const date in groupedData) {
                            const dateRow = tableBody.insertRow();
                            dateRow.className = 'date-header';
                            const dateCell = dateRow.insertCell();
                            dateCell.colSpan = orderedHeaders.length + 1;
                            dateCell.textContent = date;

                            groupedData[date].forEach(row => {
                                const tr = tableBody.insertRow();
                                orderedHeaders.forEach(key => {
                                    const td = tr.insertCell();
                                    let cellValue = row[key.charAt(0).toUpperCase() + key.slice(1)] || row[key];
                                    if (key === 'country') {
                                        cellValue = countryNameMap[cellValue] || cellValue;
                                    }
                                    td.textContent = cellValue;
                                    if (key !== 'timestamp') td.contentEditable = true;
                                });

                                const actionTd = tr.insertCell();
                                const saveButton = document.createElement('button');
                                saveButton.textContent = '保存';
                                saveButton.className = 'save-btn';
                                saveButton.onclick = () => saveRow(tr, orderedHeaders);
                                actionTd.appendChild(saveButton);

                                const deleteButton = document.createElement('button');
                                deleteButton.textContent = '删除';
                                deleteButton.className = 'delete-btn-dash';
                                deleteButton.onclick = () => deleteRow(tr, row.timestamp || row.Timestamp);
                                actionTd.appendChild(deleteButton);
                            });
                        }
                    })
                    .catch(error => {
                        console.error('获取表格数据失败:', error);
                        document.querySelector('#feedbackTable tbody').innerHTML = `<tr><td colspan="7">加载数据失败。</td></tr>`;
                    });
            }

            // 初始加载
            renderMap();
            renderTable();

            // 窗口大小改变时重绘图表
            window.addEventListener('resize', () => mapChart.resize());
        });

        function handleAuthError(response) {
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('authToken');
                window.location.href = '/login.html';
            }
            return response;
        }

        function saveRow(tableRow, headers) {
            const updatedRow = {};
            headers.forEach((header, index) => {
                updatedRow[header] = tableRow.cells[index].textContent;
            });

            fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(updatedRow),
            })
            .then(handleAuthError)
            .then(response => {
                if (!response.ok) throw new Error('网络响应错误');
                alert('数据已成功保存！');
            })
            .catch(error => alert('保存失败，请检查服务器日志。'));
        }

        function deleteRow(tableRow, timestamp) {
            if (!confirm('您确定要删除这条记录吗？此操作无法撤销。')) return;

            fetch('/api/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ Timestamp: timestamp }),
            })
            .then(handleAuthError)
            .then(response => {
                if (!response.ok) throw new Error('网络响应错误');
                alert('数据已成功删除！');
                tableRow.remove();
                // 重新渲染地图以反映删除
                window.location.reload();
            })
            .catch(error => alert('删除失败，请检查服务器日志。'));
        }
    </script>
</body>
</html>
