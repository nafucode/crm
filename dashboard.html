<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Intelligence Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script> <!-- Add SheetJS library -->
    <style>
        :root {
            --bg-color: #f8f9fa; /* Light gray background */
            --primary-color: #007bff; /* Professional blue */
            --text-color: #212529; /* Dark text */
            --secondary-text-color: #6c757d; /* Gray for labels */
            --border-color: #dee2e6; /* Light border */
            --white: #ffffff;
            --danger-color: #dc3545;
            --shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); /* Subtle shadow */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .navbar {
            background: var(--white);
            padding: 0 2.5rem; /* Increased right padding */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            height: 60px;
            box-shadow: var(--shadow);
            box-sizing: border-box; /* Add this line */
        }

        .navbar-brand {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 40px; /* Adjust height as needed */
            width: auto;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
        }

        .nav-link {
            color: var(--secondary-text-color);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        .main-content {
            padding: 80px 2rem 2rem;
        }


        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .panel {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .panel-title {
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 0; /* Remove margin when in container */
        }

        .panel-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .form-control {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-secondary {
            background-color: var(--secondary-text-color);
            border-color: var(--secondary-text-color);
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        #world-map {
            width: 100%;
            height: 500px;
        }

        .table-container {
            overflow-x: auto;
            max-height: 600px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-color);
        }

        th,
        td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #data-table {
            table-layout: fixed;
            min-width: 960px;
        }
        #data-table th:nth-child(1) { width: 155px; } /* 日期 */
        #data-table th:nth-child(2) { width: 80px; }  /* 国家 */
        #data-table th:nth-child(3) { }               /* 客户信息 — flexible */
        #data-table th:nth-child(4) { width: 145px; } /* 电话 */
        #data-table th:nth-child(5) { width: 160px; } /* 其他描述 */
        #data-table th:nth-child(6) { width: 72px;  } /* 经销商 */
        #data-table th:nth-child(7) { width: 72px;  } /* 提交人 */
        #data-table th:nth-child(8) { width: 130px; } /* 操作 */

        td[data-field="summary"],
        td[data-field="customerId"] {
            white-space: normal;
            word-break: break-word;
        }

        tbody tr.is-dealer {
            background-color: #fffbe6 !important;
        }
        tbody tr.is-dealer:hover {
            background-color: #fff3b0 !important;
        }

        /* Toggle switch for 经销商 */
        .dealer-toggle {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
            cursor: pointer;
        }
        .dealer-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .dealer-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 20px;
            transition: background-color .25s;
        }
        .dealer-slider::before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: transform .25s;
        }
        .dealer-toggle input:checked + .dealer-slider {
            background-color: var(--primary-color);
        }
        .dealer-toggle input:checked + .dealer-slider::before {
            transform: translateX(16px);
        }

        thead th {
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
        }

        tbody tr {
            background-color: var(--white);
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f1f3f5;
        }

        .btn {
            padding: 5px 10px;
            border: 1px solid transparent;
            background-color: var(--primary-color);
            color: var(--white);
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-delete {
            background-color: transparent;
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        .btn-delete:hover {
            background-color: var(--danger-color);
            color: var(--white);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            width: calc(100% - 16px);
        }

        /* ── Tabs ── */
        .tab-nav {display:flex;gap:4px;border-bottom:2px solid var(--border-color);margin-bottom:1.5rem;}
        .tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:0.95rem;color:var(--secondary-text-color);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:color .2s;}
        .tab-btn.active{color:var(--primary-color);border-bottom-color:var(--primary-color);font-weight:600;}
        .tab-btn:hover{color:var(--primary-color);}
        .tab-pane{display:none;}.tab-pane.active{display:block;}

        /* ── Prospect search ── */
        .prospect-search-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:1.5rem;}
        .prospect-field label{display:block;font-size:0.8rem;font-weight:600;color:var(--secondary-text-color);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
        .prospect-field select,.prospect-field input{padding:8px 12px;border:1px solid var(--border-color);border-radius:6px;font-size:0.9rem;font-family:inherit;background:var(--white);color:var(--text-color);min-width:160px;}
        .prospect-table th{font-size:0.78rem;font-weight:600;color:var(--secondary-text-color);text-transform:uppercase;letter-spacing:.04em;background:var(--bg-color);}
        .prospect-table td{font-size:0.88rem;vertical-align:middle;}
        .prospect-tag{display:inline-block;font-size:0.75rem;font-weight:600;padding:2px 8px;border-radius:99px;background:#e7f0ff;color:var(--primary-color);}
        .prospect-phone{font-family:'SF Mono',Menlo,monospace;font-size:0.82rem;}
        .wa-num{color:#25d366;}
        .prospect-loading{text-align:center;padding:50px;color:var(--secondary-text-color);}
        .prospect-empty{text-align:center;padding:50px;color:var(--secondary-text-color);}
        .saved-section{margin-top:2rem;}
    </style>
</head>

            document.getElementById('username-display').textContent = `Welcome, ${username}`;

        function exportToExcel() {
            if (currentFilteredData.length === 0) {
                alert('没有可导出的数据。');
                return;

            // 1. Prepare data with Chinese headers
            const dataToExport = currentFilteredData.map(item => ({

                '国家': getChineseCountryName(item.country),
                '客户信息': item.customerId,

            // 2. Create worksheet and workbook
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "客户数据");

            XLSX.writeFile(wb, "customer_data.xlsx");

        function renderDailySubmissionChart(data) {
            const chartDom = document.getElementById('daily-submission-chart');
            const myChart = echarts.init(chartDom);

            // 1. Prepare date range (last 7 days)
            const dates = [];
            const dateLabels = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]); // YYYY-MM-DD for matching
                dateLabels.push(`${d.getMonth() + 1}/${d.getDate()}`); // M/D for display
            }

            // 2. Process data
            const adminData = new Array(7).fill(0);
            const otherData = new Array(7).fill(0);

            data.forEach(item => {
                const itemDate = (item.Timestamp || item.timestamp).split('T')[0];
                const dateIndex = dates.indexOf(itemDate);
                if (dateIndex > -1) {
                    if (item.salesperson === 'admin') {
                        adminData[dateIndex]++;
                    } else {
                        otherData[dateIndex]++;
                    }
                }
            });

            // 3. ECharts option
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                legend: {
                    data: ['邮件和表单 (admin)', 'Whatsapp咨询 (其他)']
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dateLabels
                },
                yAxis: {
                    type: 'value'
                },
                series: [
                    {
                        name: '邮件和表单 (admin)',
                        type: 'bar',
                        stack: 'total',
                        emphasis: { focus: 'series' },
                        data: adminData,
                        itemStyle: { color: '#007bff' } // Blue for admin
                    },
                    {
                        name: 'Whatsapp咨询 (其他)',
                        type: 'bar',
                        stack: 'total',
                        emphasis: { focus: 'series' },
                        data: otherData,
                        itemStyle: { color: '#6c757d' } // Gray for others
                    }
                ]
            };

            myChart.setOption(option);
        }

        function generateMapData(data) {
            const countryCounts = data.reduce((acc, row) => {
                const country = row.country;
                if (country) {
                    acc[country] = (acc[country] || 0) + 1;
                }
                return acc;
            }, {});

            return Object.keys(countryCounts).map(name => ({
                name,
                value: countryCounts[name]
            }));
        }

        function applyFilters() {
            const startDate = document.getElementById('filter-start-date').value;
            const endDate = document.getElementById('filter-end-date').value;
            const country = document.getElementById('filter-country').value.toLowerCase();

            let filteredData = allData.filter(item => {
                const itemDate = new Date(item.Timestamp || item.timestamp);
                const itemCountry = item.country ? item.country.toLowerCase() : '';
                const translatedCountry = translateCountry(item.country).toLowerCase();

                let dateMatch = true;
                if (startDate) {
                    dateMatch = itemDate >= new Date(startDate);
                }
                if (endDate) {
                    // Add 1 day to the end date to include the whole day
                    const endOfDay = new Date(endDate);
                    endOfDay.setDate(endOfDay.getDate() + 1);
                    dateMatch = dateMatch && itemDate < endOfDay;
                }

                const countryMatch = country ? itemCountry.includes(country) || translatedCountry.includes(country) : true;

                return dateMatch && countryMatch;
            });

            renderAll(filteredData);
        }

        function resetFilters() {
            document.getElementById('filter-start-date').value = '';
            document.getElementById('filter-end-date').value = '';
            document.getElementById('filter-country').value = '';

        function renderTable(data) {
            const tableBody = document.querySelector('#data-table tbody');
            tableBody.innerHTML = '';
            // Sort by timestamp descending (newest first) to guarantee order
            const sortedData = [...data].sort((a, b) => {
                const dateA = new Date(a.Timestamp || a.timestamp);
                const dateB = new Date(b.Timestamp || b.timestamp);
                return dateB - dateA;
            });
            sortedData.forEach(item => {
                const row = tableBody.insertRow();
                // Handle both 'Timestamp' and 'timestamp'
                const timestamp = item.Timestamp || item.timestamp;
                if (item.isDealer) row.classList.add('is-dealer');
                row.innerHTML = `
                    <td data-field="timestamp">${new Date(timestamp).toLocaleString()}</td>
                    <td data-field="country">${getChineseCountryName(item.country)}</td>
                    <td data-field="customerId">${item.customerId}</td>
                    <td data-field="phone" contenteditable="true">${item.phone || ''}</td>
                    <td data-field="summary" contenteditable="true">${item.summary}</td>
                    <td style="text-align:center">
                        <label class="dealer-toggle" title="标记为经销商">
                            <input type="checkbox" class="dealer-check" ${item.isDealer ? 'checked' : ''} onchange="toggleDealer(this)">
                            <span class="dealer-slider"></span>
                        </label>
                    </td>
                    <td data-field="salesperson">${item.salesperson}</td>
                    <td>
                        <button class="btn btn-save" onclick="updateRow(this)">Save</button>
                        <button class="btn btn-delete" onclick="deleteRow(this)">Delete</button>
                    </td>
                `;
                row.dataset.timestamp = timestamp;
            });
        }

        function updateSummary(data) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

            const todayCount = data.filter(item => new Date(item.Timestamp || item.timestamp) >= today).length;
            const weekCount = data.filter(item => new Date(item.Timestamp || item.timestamp) >= startOfWeek).length;
            const monthCount = data.filter(item => new Date(item.Timestamp || item.timestamp) >= startOfMonth).length;

            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-today').textContent = todayCount;
            document.getElementById('stat-week').textContent = weekCount;
            document.getElementById('stat-month').textContent = monthCount;
        }


        window.toggleDealer = function (checkbox) {
            const row = checkbox.closest('tr');
            const timestamp = row.dataset.timestamp;
            const phone = row.querySelector('[data-field="phone"]').textContent;
            const summary = row.querySelector('[data-field="summary"]').textContent;
            const isDealer = checkbox.checked;

            fetch('/api/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ timestamp, phone, summary, isDealer })
            })
            .then(response => {
                if (!response.ok) throw new Error('Update failed');
                row.classList.toggle('is-dealer', isDealer);
            })
            .catch(error => {
                console.error('Error toggling dealer status:', error);
                checkbox.checked = !checkbox.checked; // revert on failure
            });
        }

        window.updateRow = function (button) {
            const row = button.closest('tr');
            const timestamp = row.dataset.timestamp;
            const phone = row.querySelector('[data-field="phone"]').textContent;
            const summary = row.querySelector('[data-field="summary"]').textContent;
            const isDealer = row.querySelector('.dealer-check')?.checked ?? false;

            fetch('/api/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ timestamp, phone, summary, isDealer })
            })
                .then(response => {
                    if (!response.ok) throw new Error('Update failed');
                    return response.json();
                })
                .then(data => {
                    console.log('Update successful:', data);
                    alert('Record updated successfully!');
                })
                .catch(error => {
                    console.error('Error updating row:', error);
                    alert('Failed to update record.');
                });
        }

        window.deleteRow = function (button) {
            const row = button.closest('tr');
            const timestamp = row.dataset.timestamp;

            if (!confirm('Are you sure you want to delete this record?')) {
                return;
            }

            fetch('/api/delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ timestamp: timestamp })
            })
                .then(response => {
                    if (response.ok) {
                        row.remove();
                        alert('Record deleted successfully.');
                        // Refetch data to update summary and map
                        fetchDataAndRender();
                        fetchMapDataAndRender();
                    } else {
                        // Handle potential casing issue on retry
                        return response.json().then(err => {
                            if (response.status === 400) {
                                console.warn('Delete failed with original timestamp, trying alternative casing.');
                                // The backend expects 'timestamp', but the original data might have 'Timestamp'.
                                // The dataset attribute is already lowercase. Let's try sending 'Timestamp' if the first fails.
                                // This is a bit of a guess, the real fix is backend consistency.
                                // Based on the provided summary, the backend was fixed to handle either.
                                // The issue might be something else.
                                alert(`Error deleting record: ${err.message || 'Bad Request'}`);
                            } else {
                                throw new Error(err.message || 'Delete failed');
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('Error deleting row:', error);
                    alert(`Failed to delete record: ${error.message}`);
                });
        }

    // In-memory cache of saved prospects (loaded from API)
    let _savedProspects = null;

    async function getSavedProspects() {
        if (_savedProspects !== null) return _savedProspects;
        try {
            const r = await fetch(SEO_API + '/api/prospects');
            const d = await r.json();
            _savedProspects = d.prospects || [];
        } catch { _savedProspects = []; }
        return _savedProspects;
    }

    async function crmSearchProspects(loadMore = false) {
        const country = document.getElementById('p-country').value;
        const city    = document.getElementById('p-city').value;
        const type    = document.getElementById('p-type').value;
        if (!country) { alert('请选择国家'); return; }
        if (!city || city === '__other__') { alert('请选择或输入城市'); return; }

        const saved = await getSavedProspects();
        const exclude = loadMore
            ? saved.filter(p => p.city === city && p.country === country).map(p => p.company).filter(Boolean)
            : [];

        const btn = document.getElementById('p-search-btn');
        const moreBtn = document.getElementById('p-more-btn');
        if (loadMore && moreBtn) { moreBtn.disabled = true; moreBtn.textContent = '搜索中...'; }
        else { btn.disabled = true; btn.textContent = '搜索中...'; }

        if (!loadMore) {
            document.getElementById('p-results').innerHTML =
                `<div class="prospect-loading">⏳ AI 正在用 Google 搜索 ${city}, ${country} 的电梯经销商...</div>`;
        }
        try {
            const r = await fetch(SEO_API + '/api/search-dealers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({country, city, type, exclude})
            });
            const d = await r.json();
            if (d.error) throw new Error(d.error);
            await crmRenderResults(d.dealers || [], country, city, loadMore);
        } catch(e) {
            document.getElementById('p-results').innerHTML =
                `<div class="prospect-empty">❌ 搜索失败: ${e.message}</div>`;
        } finally {
            btn.disabled = false; btn.textContent = '🔍 AI 搜索';
            if (moreBtn) { moreBtn.disabled = false; moreBtn.textContent = '🔍 搜索更多'; }
        }
    }

    async function crmRenderResults(dealers, country, city, append = false) {
        if (!dealers.length) {
            if (!append) document.getElementById('p-results').innerHTML = '<div class="prospect-empty">未找到结果，换个城市试试</div>';
            return;
        }

        const saved = await getSavedProspects();
        const existingKeys = new Set(saved.map(p => (p.company||'').toLowerCase() + '|' + (p.city||'').toLowerCase()));
        const toAdd = [];
        const isNew = dealers.map(d => {
            const key = (d.company||'').toLowerCase() + '|' + city.toLowerCase();
            if (existingKeys.has(key)) return false;
            existingKeys.add(key);
            const rec = {...d, country, city, id: String(Date.now()) + String(Math.random()).slice(2,6),
                         saved_at: new Date().toLocaleDateString('zh-CN')};
            toAdd.push(rec);
            _savedProspects.push(rec);
            return true;
        });

        // Render saved list immediately from in-memory data
        if (toAdd.length) {
            renderSavedList(_savedProspects);
            // Then write to Google Sheets in background
            fetch(SEO_API + '/api/prospects', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({rows: toAdd})
            }).then(async r => {
                const d = await r.json();
                if (d.error) {
                    const el = document.getElementById('p-sheet-status');
                    if (el) el.innerHTML = `<span style="color:#dc3545">⚠️ Sheet 同步失败: ${d.error}</span>`;
                } else {
                    const el = document.getElementById('p-sheet-status');
                    if (el) el.innerHTML = `<span style="color:green">✓ 已同步到 Google Sheet</span>`;
                }
            }).catch(e => {
                const el = document.getElementById('p-sheet-status');
                if (el) el.innerHTML = `<span style="color:#dc3545">⚠️ 网络错误: ${e.message}</span>`;
            });
        }

        const rows = dealers.map((d, i) => {
            const alreadySaved = !isNew[i];
            return `<tr style="${alreadySaved ? 'opacity:0.45' : ''}">
                <td style="font-size:.75rem;color:${alreadySaved ? 'var(--secondary-text-color)' : 'var(--primary-color)'}">
                    ${alreadySaved ? '已保存' : '✓ 新增'}
                </td>
                <td><span class="prospect-tag">${country}</span></td>
                <td>${city}</td>
                <td style="font-weight:500">${d.company||'-'}</td>
                <td class="prospect-phone">${d.phone||'-'}</td>
                <td class="prospect-phone wa-num">${d.whatsapp||d.phone||'-'}</td>
                <td style="font-size:.82rem">${d.website?`<a href="${d.website.startsWith('http')?d.website:'https://'+d.website}" target="_blank" style="color:var(--primary-color)">${d.website.replace(/^https?:\/\//,'').split('/')[0]}</a>`:'-'}</td>
                <td style="font-size:.82rem;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.address||''}</td>
            </tr>`;
        }).join('');

        const savedCount = (_savedProspects||[]).filter(p => p.city === city && p.country === country).length;

        if (append) {
            const tbody = document.querySelector('#p-results .prospect-table tbody');
            if (tbody) tbody.insertAdjacentHTML('beforeend', rows);
            const summary = document.getElementById('p-results-summary');
            if (summary) summary.textContent = `已保存 ${savedCount} 家 · ${city}, ${country}`;
        } else {
            document.getElementById('p-results').innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <span id="p-results-summary" style="font-weight:600">已保存 ${savedCount} 家 · ${city}, ${country}</span>
                    <button id="p-more-btn" class="btn btn-secondary" onclick="crmSearchProspects(true)" style="padding:6px 16px">🔍 搜索更多</button>
                </div>
                <div id="p-sheet-status" style="font-size:.8rem;margin-bottom:10px;color:var(--secondary-text-color)">⏳ 正在同步到 Google Sheet...</div>
                <div class="table-container">
                    <table class="prospect-table">
                        <thead><tr><th>状态</th><th>国家</th><th>城市</th><th>公司名称</th><th>电话</th><th>WhatsApp</th><th>网站</th><th>地址</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }
    }

    function renderSavedList(list) {
        const sec = document.getElementById('p-saved-section');
        if (!list.length) { sec.style.display='none'; return; }
        sec.style.display = 'block';
        document.getElementById('p-saved-count').textContent = `(${list.length})`;
        document.getElementById('p-saved-body').innerHTML = list.map((p,i) => `
            <tr>
                <td style="color:var(--secondary-text-color);font-size:.8rem">${i+1}</td>
                <td><span class="prospect-tag">${p.country||''}</span></td>
                <td>${p.city||''}</td>
                <td style="font-weight:500">${p.company||'-'}</td>
                <td class="prospect-phone">${p.phone||'-'}</td>
                <td class="prospect-phone wa-num">${p.whatsapp||p.phone||'-'}</td>
                <td style="font-size:.82rem">${p.website?`<a href="${p.website.startsWith('http')?p.website:'https://'+p.website}" target="_blank" style="color:var(--primary-color)">${p.website.replace(/^https?:\/\//,'').split('/')[0]}</a>`:'-'}</td>
                <td style="font-size:.8rem;color:var(--secondary-text-color)">${p.saved_at||''}</td>
                <td><button class="btn btn-delete" onclick="crmDeleteProspect('${p.id}')">删除</button></td>
            </tr>`).join('');
    }

    async function crmLoadSaved() {
        _savedProspects = null; // force fresh fetch from Sheet
        const list = await getSavedProspects();
        renderSavedList(list);
    }

    async function crmDeleteProspect(id) {
        await fetch(SEO_API + '/api/prospects/' + id, {method: 'DELETE'});
        crmLoadSaved();
    }

    function crmClearProspects() {
        alert('请直接在 Google Sheet 里清空数据');
    }
    </script>
</body>

</html>
