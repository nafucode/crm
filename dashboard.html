<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.3.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script> <!-- Add SheetJS library -->
    <style>
        :root {
            --bg-color: #f8f9fa; /* Light gray background */
            --primary-color: #007bff; /* Professional blue */
            --text-color: #212529; /* Dark text */
            --secondary-text-color: #6c757d; /* Gray for labels */
            --border-color: #dee2e6; /* Light border */
            --white: #ffffff;
            --danger-color: #dc3545;
            --shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); /* Subtle shadow */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .navbar {
            background: var(--white);
            padding: 0 2.5rem; /* Increased right padding */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            height: 60px;
            box-shadow: var(--shadow);
            box-sizing: border-box; /* Add this line */
        }

        .navbar-brand {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.5rem;
            text-decoration: none;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
        }

        .nav-link {
            color: var(--secondary-text-color);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        .main-content {
            padding: 80px 2rem 2rem;
        }

        .page-header {
            font-size: 2rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--secondary-text-color);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .panel {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
        }

        .panel-title {
            font-size: 1.5rem;
            color: var(--text-color);
            margin-bottom: 0; /* Remove margin when in container */
        }

        .panel-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .form-control {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-secondary {
            background-color: var(--secondary-text-color);
            border-color: var(--secondary-text-color);
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        #world-map {
            width: 100%;
            height: 500px;
        }

        .table-container {
            overflow-x: auto;
            max-height: 600px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-color);
        }

        th,
        td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem; /* Smaller font */
            white-space: nowrap; /* Prevent wrapping */
        }

        thead th {
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
        }

        tbody tr {
            background-color: var(--white);
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f1f3f5;
        }

        .btn {
            padding: 5px 10px;
            border: 1px solid transparent;
            background-color: var(--primary-color);
            color: var(--white);
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn-delete {
            background-color: transparent;
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        .btn-delete:hover {
            background-color: var(--danger-color);
            color: var(--white);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            border-radius: 4px;
            width: calc(100% - 16px);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="/dashboard.html" class="navbar-brand">CRM Intelligence</a>
        <div class="navbar-nav">
            <a href="/index.html" class="nav-link">返回提交表单</a>
            <span id="username-display" class="nav-link"></span>
            <a href="#" id="logout" class="nav-link">退出登录</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">Dashboard</div>

        <div class="summary-grid" id="summary-grid">
            <div class="stat-card">
                <div class="stat-label">总客户数</div>
                <div class="stat-value" id="stat-total">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今日新增</div>
                <div class="stat-value" id="stat-today">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本周新增</div>
                <div class="stat-value" id="stat-week">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本月新增</div>
                <div class="stat-value" id="stat-month">—</div>
            </div>
        </div>

        <div class="panel map-panel">
            <div class="panel-title">全球分布</div>
            <div id="world-map"></div>
        </div>

        <div class="panel filter-panel">
            <div class="filter-controls">
                <div class="form-group">
                    <label for="filter-start-date">开始日期</label>
                    <input type="date" id="filter-start-date" class="form-control">
                </div>
                <div class="form-group">
                    <label for="filter-end-date">结束日期</label>
                    <input type="date" id="filter-end-date" class="form-control">
                </div>
                <div class="form-group">
                    <label for="filter-country">国家</label>
                    <input type="text" id="filter-country" placeholder="输入国家名称..." class="form-control">
                </div>
                <div class="form-group-buttons">
                    <button id="filter-apply-btn" class="btn">应用筛选</button>
                    <button id="filter-reset-btn" class="btn btn-secondary">重置</button>
                </div>
            </div>
        </div>

        <div class="panel table-panel">
            <div class="panel-title-container">
                <div class="panel-title">客户信息</div>
                <button id="export-excel-btn" class="btn">导出 Excel</button>
            </div>
            <div class="table-container">
                <table id="data-table">
                        <thead>
                            <tr>
                            <th>日期</th>
                            <th>国家</th>
                            <th>客户信息</th>
                            <th>电话</th>
                            <th>其他描述</th>
                            <th>提交人</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                    <tbody>
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const countryOptions = {
            "非洲": [
                { value: "Algeria", label: "Algeria 阿尔及利亚" },
                { value: "Angola", label: "Angola 安哥拉" },
                { value: "Benin", label: "Benin 贝宁" },
                { value: "Botswana", label: "Botswana 博茨瓦纳" },
                { value: "Cameroon", label: "Cameroon 喀麦隆" },
                { value: "Cote d'Ivoire", label: "Cote d'Ivoire 科特迪瓦" },
                { value: "Djibouti", label: "Djibouti 吉布提" },
                { value: "Democratic Republic of the Congo", label: "Democratic Republic of the Congo 刚果民主共和国" },
                { value: "Egypt", label: "Egypt 埃及" },
                { value: "Ethiopia", label: "Ethiopia 埃塞俄比亚" },
                { value: "Ghana", label: "Ghana 加纳" },
                { value: "Guinea", label: "Guinea 几内亚" },
                { value: "Kenya", label: "Kenya 肯尼亚" },
                { value: "Libya", label: "Libya 利比亚" },
                { value: "Mali", label: "Mali 马里" },
                { value: "Mauritius", label: "Mauritius 毛里求斯" },
                { value: "Morocco", label: "Morocco 摩洛哥" },
                { value: "Mozambique", label: "Mozambique 莫桑比克" },
                { value: "Namibia", label: "Namibia 纳米比亚" },
                { value: "Nigeria", label: "Nigeria 尼日利亚" },
                { value: "Rwanda", label: "Rwanda 卢旺达" },
                { value: "Senegal", label: "Senegal 塞内加尔" },
                { value: "Seychelles", label: "Seychelles 塞舌尔" },
                { value: "Sierra Leone", label: "Sierra Leone 塞拉利昂" },
                { value: "Somalia", label: "Somalia 索马里" },
                { value: "South Africa", label: "South Africa 南非" },
                { value: "Tanzania", label: "Tanzania 坦桑尼亚" },
                { value: "Uganda", label: "Uganda 乌干达" },
                { value: "Zambia", label: "Zambia 赞比亚" },
                { value: "Zimbabwe", label: "Zimbabwe 津巴布韦" },
            ],
            "亚洲": [
                { value: "Afghanistan", label: "Afghanistan 阿富汗" },
                { value: "Bangladesh", label: "Bangladesh 孟加拉国" },
                { value: "Cambodia", label: "Cambodia 柬埔寨" },
                { value: "Indonesia", label: "Indonesia 印度尼西亚" },
                { value: "Iraq", label: "Iraq 伊拉克" },
                { value: "Kazakhstan", label: "Kazakhstan 哈萨克斯坦" },
                { value: "Kyrgyzstan", label: "Kyrgyzstan 吉尔吉斯斯坦" },
                { value: "Malaysia", label: "Malaysia 马来西亚" },
                { value: "Mongolia", label: "Mongolia 蒙古" },
                { value: "Oman", label: "Oman 阿曼" },
                { value: "Philippines", label: "Philippines 菲律宾" },
                { value: "Qatar", label: "Qatar 卡塔尔" },
                { value: "Saudi Arabia", label: "Saudi Arabia 沙特阿拉伯" },
                { value: "Syria", label: "Syria 叙利亚" },
                { value: "Tajikistan", label: "Tajikistan 塔吉克斯坦" },
                { value: "Thailand", label: "Thailand 泰国" },
                { value: "United Arab Emirates", label: "United Arab Emirates 阿拉伯联合酋长国" },
            ],
            "欧洲": [
                { value: "Russia", label: "Russia 俄罗斯" },
                { value: "Ukraine", label: "Ukraine 乌克兰" },
            ],
            "北美洲": [
                { value: "Costa Rica", label: "Costa Rica 哥斯达黎加" },
                { value: "El Salvador", label: "El Salvador 萨尔瓦多" },
                { value: "Guatemala", label: "Guatemala 危地马拉" },
                { value: "Honduras", label: "Honduras 洪都拉斯" },
                { value: "Mexico", label: "Mexico 墨西哥" },
                { value: "Panama", label: "Panama 巴拿马" },
            ],
            "南美洲": [
                { value: "Argentina", label: "Argentina 阿根廷" },
                { value: "Brazil", label: "Brazil 巴西" },
                { value: "Colombia", label: "Colombia 哥伦比亚" },
                { value: "Ecuador", label: "Ecuador 厄瓜多尔" },
                { value: "Guyana", label: "Guyana 圭亚那" },
                { value: "Paraguay", label: "Paraguay 巴拉圭" },
                { value: "Peru", label: "Peru 秘鲁" },
            ],
            "大洋洲": [
                { value: "Australia", label: "Australia 澳大利亚" },
                { value: "Papua New Guinea", label: "Papua New Guinea 巴布亚新几内亚" },
            ]
        };

        const countryTranslationMap = Object.values(countryOptions).flat().reduce((acc, country) => {
            acc[country.value] = country.label;
            return acc;
        }, {});

        function translateCountry(englishName) {
            return countryTranslationMap[englishName] || englishName;
        }

        let allData = []; // Store all data globally

        document.addEventListener('DOMContentLoaded', function () {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            const payload = JSON.parse(atob(token.split('.')[1]));
            const username = payload.username;
            document.getElementById('username-display').textContent = `Welcome, ${username}`;

            if (payload.role !== 'admin') {
                alert('Access Denied. Admins only.');
                window.location.href = '/login.html';
                return;
            }

            document.getElementById('logout').addEventListener('click', function (e) {
                e.preventDefault();
                localStorage.removeItem('token');
                window.location.href = '/login.html';
            });

            document.getElementById('filter-apply-btn').addEventListener('click', applyFilters);
            document.getElementById('filter-reset-btn').addEventListener('click', resetFilters);
            document.getElementById('export-excel-btn').addEventListener('click', exportToExcel);

            fetchInitialData();
        });

        let currentFilteredData = []; // Store currently filtered data

        function fetchInitialData() {
            fetch('/api/data', {
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                }
            })
            .then(response => response.json())
            .then(data => {
                allData = data;
                currentFilteredData = allData;
                renderAll(currentFilteredData);
            })
            .catch(error => console.error('Error fetching data:', error));
        }

        function renderAll(data) {
            currentFilteredData = data; // Update the global filtered data
            renderTable(data);
            updateSummary(data);
            renderMap(generateMapData(data));
        }

        function exportToExcel() {
            if (currentFilteredData.length === 0) {
                alert('没有可导出的数据。');
                return;
            }

            // 1. Prepare data with Chinese headers
            const dataToExport = currentFilteredData.map(item => ({
                '日期': new Date(item.Timestamp || item.timestamp).toLocaleString(),
                '国家': translateCountry(item.country),
                '客户信息': item.customerId,
                '电话': item.phone || '',
                '其他描述': item.summary || '',
                '提交人': item.salesperson
            }));

            // 2. Create worksheet and workbook
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "客户数据");

            // 3. Trigger download
            XLSX.writeFile(wb, "customer_data.xlsx");
        }

        function generateMapData(data) {
            const countryCounts = data.reduce((acc, row) => {
                const country = row.country;
                if (country) {
                    acc[country] = (acc[country] || 0) + 1;
                }
                return acc;
            }, {});

            return Object.keys(countryCounts).map(name => ({
                name,
                value: countryCounts[name]
            }));
        }

        function applyFilters() {
            const startDate = document.getElementById('filter-start-date').value;
            const endDate = document.getElementById('filter-end-date').value;
            const country = document.getElementById('filter-country').value.toLowerCase();

            let filteredData = allData.filter(item => {
                const itemDate = new Date(item.Timestamp || item.timestamp);
                const itemCountry = item.country ? item.country.toLowerCase() : '';
                const translatedCountry = translateCountry(item.country).toLowerCase();

                let dateMatch = true;
                if (startDate) {
                    dateMatch = itemDate >= new Date(startDate);
                }
                if (endDate) {
                    // Add 1 day to the end date to include the whole day
                    const endOfDay = new Date(endDate);
                    endOfDay.setDate(endOfDay.getDate() + 1);
                    dateMatch = dateMatch && itemDate < endOfDay;
                }

                const countryMatch = country ? itemCountry.includes(country) || translatedCountry.includes(country) : true;

                return dateMatch && countryMatch;
            });

            renderAll(filteredData);
        }

        function resetFilters() {
            document.getElementById('filter-start-date').value = '';
            document.getElementById('filter-end-date').value = '';
            document.getElementById('filter-country').value = '';
            renderAll(allData);
        }

        function renderMap(mapData) {
            const mapChart = echarts.init(document.getElementById('world-map'));
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (!params.name) return;
                        const translatedName = translateCountry(params.name);
                        return `${translatedName}: ${params.value}`;
                    }
                },
                visualMap: {
                    min: 0,
                    max: Math.max(...mapData.map(item => item.value), 10),
                    left: 'left',
                    top: 'bottom',
                    text: ['High', 'Low'],
                    calculable: true,
                    inRange: {
                        color: ['#5291FF', '#FFD93D', '#FF6B6B'] // Blue -> Yellow -> Red
                    },
                    textStyle: {
                        color: 'var(--text-color)'
                    }
                },
                series: [{
                    name: 'Customer Distribution',
                    type: 'map',
                    map: 'world',
                    roam: true,
                    data: mapData,
                    nameMap: {
                        // You can add mappings for country names if needed
                        'United States': 'United States of America'
                    }
                }]
            };
            // Need to fetch the world map GeoJSON
            fetch('https://cdn.jsdelivr.net/npm/echarts/map/json/world.json')
                .then(res => res.json())
                .then(worldJson => {
                    echarts.registerMap('world', worldJson);
                    mapChart.setOption(option);
                });
        }

        function renderTable(data) {
            const tableBody = document.querySelector('#data-table tbody');
            tableBody.innerHTML = '';
            data.forEach(item => {
                const row = tableBody.insertRow();
                // Handle both 'Timestamp' and 'timestamp'
                const timestamp = item.Timestamp || item.timestamp;
                row.innerHTML = `
                    <td data-field="timestamp">${new Date(timestamp).toLocaleString()}</td>
                    <td data-field="country">${translateCountry(item.country)}</td>
                    <td data-field="customerId">${item.customerId}</td>
                    <td data-field="phone" contenteditable="true">${item.phone || ''}</td>
                    <td data-field="summary" contenteditable="true">${item.summary}</td>
                    <td data-field="salesperson">${item.salesperson}</td>
                    <td>
                        <button class="btn btn-save" onclick="updateRow(this)">Save</button>
                        <button class="btn btn-delete" onclick="deleteRow(this)">Delete</button>
                    </td>
                `;
                row.dataset.timestamp = timestamp;
            });
        }

        function updateSummary(data) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

            const todayCount = data.filter(item => new Date(item.Timestamp || item.timestamp) >= today).length;
            const weekCount = data.filter(item => new Date(item.Timestamp || item.timestamp) >= startOfWeek).length;
            const monthCount = data.filter(item => new Date(item.Timestamp || item.timestamp) >= startOfMonth).length;

            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-today').textContent = todayCount;
            document.getElementById('stat-week').textContent = weekCount;
            document.getElementById('stat-month').textContent = monthCount;
        }


        window.updateRow = function (button) {
            const row = button.closest('tr');
            const timestamp = row.dataset.timestamp;
            const phone = row.querySelector('[data-field="phone"]').textContent;
            const summary = row.querySelector('[data-field="summary"]').textContent; // This is now "其他描述"

            fetch('/api/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ timestamp, phone, summary })
            })
                .then(response => {
                    if (!response.ok) throw new Error('Update failed');
                    return response.json();
                })
                .then(data => {
                    console.log('Update successful:', data);
                    alert('Record updated successfully!');
                })
                .catch(error => {
                    console.error('Error updating row:', error);
                    alert('Failed to update record.');
                });
        }

        window.deleteRow = function (button) {
            const row = button.closest('tr');
            const timestamp = row.dataset.timestamp;

            if (!confirm('Are you sure you want to delete this record?')) {
                return;
            }

            fetch('/api/delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ timestamp: timestamp })
            })
                .then(response => {
                    if (response.ok) {
                        row.remove();
                        alert('Record deleted successfully.');
                        // Refetch data to update summary and map
                        fetchDataAndRender();
                        fetchMapDataAndRender();
                    } else {
                        // Handle potential casing issue on retry
                        return response.json().then(err => {
                            if (response.status === 400) {
                                console.warn('Delete failed with original timestamp, trying alternative casing.');
                                // The backend expects 'timestamp', but the original data might have 'Timestamp'.
                                // The dataset attribute is already lowercase. Let's try sending 'Timestamp' if the first fails.
                                // This is a bit of a guess, the real fix is backend consistency.
                                // Based on the provided summary, the backend was fixed to handle either.
                                // The issue might be something else.
                                alert(`Error deleting record: ${err.message || 'Bad Request'}`);
                            } else {
                                throw new Error(err.message || 'Delete failed');
                            }
                        });
                    }
                })
                .catch(error => {
                    console.error('Error deleting row:', error);
                    alert(`Failed to delete record: ${error.message}`);
                });
        }
    </script>
</body>

</html>
